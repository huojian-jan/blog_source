baseURL = "https://huojian.tech/"
defaultContentLanguage = "zh"
languageCode = "zh-Hans"
title = "火箭的博客"
theme = "dream"

enableGitInfo = true
enableRobotsTXT = true
hasCJKLanguage = true

[params]
  author = "huojian"
  description = "huojian 的个人博客，记录技术沉淀、学习笔记与生活碎片。"
  avatar = "https://github.com/huojian-jan.png"
  headerTitle = "火箭的博客"
  motto = "Talent is enduring patience."

  lightTheme = "emerald"
  darkTheme = "forest"

  rss = true
  utterancesRepo = "giscus"  # 触发评论区渲染，实际使用 layouts/partials/commentSystems.html 中的 Giscus

  # options
  stickyNav = true
  reorderNavItems = ["about", "search", "github", "posts", "categories", "tags", "rss"]
  collapseNavItems = ["posts", "categories", "tags", "rss"]
  # noDefaultSummaryCover = true
  showTableOfContents = true
  showSummaryCoverInPost = true
  imageZoomableInPost = true
  showPrevNextPost = true

[params.navItems]
  github = { href = "https://github.com/huojian-jan", target = "_blank", icon = "logo-github", title = "GitHub" }

[params.advanced]
  customCSS = ["css/custom.css"]
  # customJS = []

[params.experimental]
  jsDate = true
  jsDateFormat = "yyyy年MM月dd日"
  # jsDateFormat = "yyyy年MM月dd日，cccc"
